global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: "vllm"
    metrics_path: /metrics
    static_configs:
      - targets:
          - "192.168.6.19:8000"
        labels:
          app: "vllm"
          model: "nvidia/Nemotron-3-Nano-Omni-30B-A3B-Reasoning-NVFP4"
